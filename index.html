<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favourite Animes!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>These are my favourite animes!</h1>
        
        <label for="anime-select">Select an Anime:</label>
        <select id="anime-select">
            <option value="" disabled selected>-- Choose a Series --</option>
            <option value="20">Naruto</option>
            <option value="1735">Naruto Shippuden</option>
            <option value="223">Dragon Ball</option>
            <option value="21">One Piece</option>
        </select>

        <div id="anime-card" class="anime-card">
            <h2 id="anime-title">Title</h2>
            <img id="anime-poster" class="anime-poster" src="" alt="Anime Poster">
            <div id="anime-score" class="score">--/10</div>
            <div id="anime-episodes" class="episodes">-- Episodes</div>
            <div id="anime-synopsis" class="synopsis">--</div>
        </div>

        <div id="error-box" class="error-message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
